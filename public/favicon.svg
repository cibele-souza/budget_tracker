<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="#0369a1"/>
  <!-- Spreadsheet body -->
  <rect x="16" y="17" width="68" height="66" rx="4" fill="white" opacity="0.95"/>
  <!-- Header row -->
  <rect x="16" y="17" width="68" height="14" rx="4" fill="#6b7280" opacity="0.5"/>
  <rect x="16" y="25" width="68" height="6" rx="0" fill="#6b7280" opacity="0.5"/>
  <!-- Grid rows -->
  <rect x="16" y="36" width="68" height="1" fill="#6b7280" opacity="0.2"/>
  <rect x="16" y="46" width="68" height="1" fill="#6b7280" opacity="0.2"/>
  <rect x="16" y="56" width="68" height="1" fill="#6b7280" opacity="0.2"/>
  <rect x="16" y="66" width="68" height="1" fill="#6b7280" opacity="0.2"/>
  <!-- Grid column -->
  <rect x="39" y="31" width="1" height="52" fill="#6b7280" opacity="0.2"/>
  <!-- Alternating row fills -->
  <rect x="17" y="37" width="66" height="8" fill="#0369a1" opacity="0.06"/>
  <rect x="17" y="47" width="66" height="8" fill="#0369a1" opacity="0.06"/>
  <rect x="17" y="57" width="66" height="8" fill="#0369a1" opacity="0.06"/>
  <!-- Euro symbol -->
  <text x="68" y="77" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#0369a1" opacity="0.95">€</text>
</svg>
